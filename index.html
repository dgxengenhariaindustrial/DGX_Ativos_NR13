<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGX | Gestão NR-13</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
}

/* HEADER */
header{
    background:#ffffff;
    padding:15px 40px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.header-left{
    display:flex;
    align-items:center;
}

header img{
    height:60px;
    margin-right:20px;
}

header h2{
    margin:0;
    color:#1f3c88;
    font-weight:600;
}

.header-buttons{
    display:flex;
    gap:10px;
}

.btn{
    border:none;
    padding:8px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    font-size:14px;
}

.btn-print{
    background:#1f3c88;
    color:white;
}

.btn-exit{
    background:#dc3545;
    color:white;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:40px auto;
    padding:0 20px;
}

/* CARD */
.card{
    background:#ffffff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
    margin-bottom:30px;
}

/* GRID */
.equipamento{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}

.equip-left h1{
    margin-top:0;
}

.equip-left p{
    margin:6px 0;
}

.equip-right{
    text-align:right;
}

.status{
    display:inline-block;
    padding:10px 18px;
    border-radius:8px;
    font-weight:bold;
    margin-bottom:10px;
}

.status.ok{
    background:#d4edda;
    color:#155724;
}

.status.vencida{
    background:#f8d7da;
    color:#721c24;
}

.proxima{
    font-size:14px;
    color:#666;
}

.data-proxima{
    font-size:22px;
    font-weight:bold;
    color:#333;
}

/* TABELA */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th{
    background:#e9ecef;
    text-align:left;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #eee;
}

.button{
    background:#1f3c88;
    color:white;
    padding:6px 12px;
    border-radius:6px;
    text-decoration:none;
    font-size:13px;
}

/* FOOTER */
footer{
    text-align:center;
    font-size:12px;
    color:#666;
    padding:20px 0;
}

/* PRINT */
@media print{
    header{
        display:none;
    }
}
</style>
</head>
<body>

<header>
    <div class="header-left">
        <img src="DGX - ENGENHARIA.png" alt="DGX Engenharia Industrial">
        <h2>DGX | Engenharia Industrial</h2>
    </div>

    <div class="header-buttons">
        <button class="btn btn-print" onclick="window.print()">📄 Gerar PDF</button>
        <button class="btn btn-exit" onclick="history.back()">🚪 Sair</button>
    </div>
</header>

<div class="container">
<div id="conteudo"></div>
</div>

<footer id="rodape"></footer>

<script>

/* ===== DATA DE GERAÇÃO ===== */
const agora = new Date();
const dataGeracao = agora.toLocaleDateString('pt-BR') + 
                    " - " + 
                    agora.toLocaleTimeString('pt-BR');

document.getElementById("rodape").innerHTML =
"Data de geração: " + dataGeracao;

/* ===== PARÂMETRO TAG ===== */
const urlParams = new URLSearchParams(window.location.search);
const tag = urlParams.get('tag');

if(!tag){
    document.getElementById("conteudo").innerHTML =
    "<div class='card'><h2>Nenhuma TAG informada na URL.</h2></div>";
}

/* ===== LINK CSV ===== */
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3cZQotIF9E8GIug0GzH75RM5WGeS1Ah3l-d56FaDpq1ZV4To3SxDRwOaBQZTRSDLK6WAgjRdrueh4/pub?gid=0&single=true&output=csv";

/* ===== FUNÇÃO ROBUSTA PARA LER CSV ===== */
function parseCSV(text){
    const linhas = text.split("\n").map(l => l.replace(/\r/g,""));
    return linhas.map(linha=>{
        const resultado=[];
        let atual="";
        let dentroAspas=false;

        for(let i=0;i<linha.length;i++){
            const char=linha[i];

            if(char === '"'){
                dentroAspas = !dentroAspas;
            }
            else if(char === ',' && !dentroAspas){
                resultado.push(atual);
                atual="";
            }
            else{
                atual+=char;
            }
        }
        resultado.push(atual);
        return resultado;
    });
}

/* ===== BUSCA DADOS ===== */
fetch(csvUrl)
.then(response => response.text())
.then(data => {

    const dados = parseCSV(data);
    const registros = dados.slice(1);
    const equipamento = registros.find(r => r[0] === tag);

    if (!equipamento) {
        document.getElementById("conteudo").innerHTML =
        "<div class='card'><h2>Equipamento não encontrado.</h2></div>";
        return;
    }

    const statusTexto = equipamento[9];
    const statusClass = statusTexto === "DENTRO DO PRAZO" ? "ok" : "vencida";

    let relatoriosHTML = "";

    if (equipamento[10])
        relatoriosHTML += `<tr>
            <td>Inspeção Visual Externa</td>
            <td>${equipamento[6]}</td>
            <td><a class="button" href="${equipamento[10]}" target="_blank">Baixar PDF</a></td>
        </tr>`;

    if (equipamento[11])
        relatoriosHTML += `<tr>
            <td>Inspeção Visual Interna</td>
            <td>${equipamento[6]}</td>
            <td><a class="button" href="${equipamento[11]}" target="_blank">Baixar PDF</a></td>
        </tr>`;

    if (equipamento[12])
        relatoriosHTML += `<tr>
            <td>Medição de Espessura</td>
            <td>${equipamento[6]}</td>
            <td><a class="button" href="${equipamento[12]}" target="_blank">Baixar PDF</a></td>
        </tr>`;

    if (equipamento[13])
        relatoriosHTML += `<tr>
            <td>Teste Hidrostático</td>
            <td>${equipamento[6]}</td>
            <td><a class="button" href="${equipamento[13]}" target="_blank">Baixar PDF</a></td>
        </tr>`;

    document.getElementById("conteudo").innerHTML = `
        <div class="card equipamento">
            <div class="equip-left">
                <h1>Equipamento: ${equipamento[0]}</h1>
                <p><strong>Categoria NR-13:</strong> ${equipamento[3]}</p>
                <p><strong>PMTA:</strong> ${equipamento[4]} bar</p>
                <p><strong>Fluido:</strong> ${equipamento[5]}</p>
            </div>

            <div class="equip-right">
                <div class="status ${statusClass}">
                    ${statusTexto}
                </div>
                <div class="proxima">Próxima inspeção</div>
                <div class="data-proxima">${equipamento[8]}</div>
            </div>
        </div>

        <div class="card">
            <h3>RELATÓRIOS</h3>
            <table>
                <tr>
                    <th>Tipo</th>
                    <th>Data</th>
                    <th>Download</th>
                </tr>
                ${relatoriosHTML}
            </table>
        </div>

        <div class="card">
            <h3>ART</h3>
            ${equipamento[14] ? `<a class="button" href="${equipamento[14]}" target="_blank">Baixar ART</a>` : "Não disponível"}
        </div>

        <div class="card">
            <h3>PRONTUÁRIO NR-13</h3>
            ${equipamento[15] ? `<a class="button" href="${equipamento[15]}" target="_blank">Baixar Prontuário</a>` : "Não disponível"}
        </div>
    `;
});

</script>

</body>
</html>
