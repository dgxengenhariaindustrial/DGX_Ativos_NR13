<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DGX | Engenharia Industrial</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#f2f4f7;
}

header {
    background:white;
    padding:15px 40px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo-area {
    display:flex;
    align-items:center;
    gap:15px;
}

.logo-area img {
    height:45px;
}

.logo-area h1 {
    font-size:22px;
    color:#1f3c88;
    margin:0;
}

.top-buttons button {
    padding:8px 15px;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    margin-left:10px;
}

.btn-pdf {
    background:#1f3c88;
    color:white;
}

.btn-sair {
    background:#d32f2f;
    color:white;
}

.container {
    width:80%;
    margin:40px auto;
}

.card {
    background:white;
    padding:25px;
    border-radius:10px;
    margin-bottom:25px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.card-flex {
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}

.status-box {
    text-align:right;
}

.status {
    padding:8px 15px;
    border-radius:6px;
    font-weight:bold;
    display:inline-block;
    margin-bottom:10px;
}

.status.ok {
    background:#c8e6c9;
    color:#256029;
}

.status.vencido {
    background:#ffcdd2;
    color:#c62828;
}

.relatorio-table {
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

.relatorio-table th {
    background:#e0e0e0;
    padding:10px;
    text-align:left;
}

.relatorio-table td {
    padding:10px;
    border-bottom:1px solid #ddd;
}

.button {
    background:#1f3c88;
    color:white;
    padding:6px 12px;
    border-radius:5px;
    text-decoration:none;
    font-size:14px;
}

footer {
    text-align:center;
    padding:15px;
    font-size:13px;
    color:#555;
}
</style>
</head>

<body>

<header>
    <div class="logo-area">
        <img src="DGX - ENGENHARIA.png">
        <h1>DGX | Engenharia Industrial</h1>
    </div>

    <div class="top-buttons">
        <button class="btn-pdf" onclick="window.print()">Gerar PDF</button>
        <button class="btn-sair" onclick="window.close()">Sair</button>
    </div>
</header>

<div class="container">

    <div class="card card-flex">
        <div>
            <h2 id="equipamento"></h2>
            <p><strong>Categoria NR-13:</strong> <span id="categoria"></span></p>
            <p><strong>PMTA:</strong> <span id="pmta"></span></p>
            <p><strong>Fluido:</strong> <span id="fluido"></span></p>
        </div>

        <div class="status-box">
            <div id="status" class="status"></div>
            <div>
                <small>Próxima inspeção</small><br>
                <strong id="proxima"></strong>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>RELATÓRIOS</h3>
        <table class="relatorio-table">
            <thead>
                <tr>
                    <th>Tipo</th>
                    <th>Data</th>
                    <th>Visualizar</th>
                </tr>
            </thead>
            <tbody id="relatorios"></tbody>
        </table>
    </div>

    <div class="card" style="padding:15px;">
        <h3>ART</h3>
        <div id="art"></div>
    </div>

    <div class="card" style="padding:15px;">
        <h3>PRONTUÁRIO NR-13</h3>
        <div id="prontuario"></div>
    </div>

</div>

<footer>
    Documento gerado automaticamente em <span id="dataGeracao"></span>
</footer>

<script>
const urlParams = new URLSearchParams(window.location.search);
const tag = urlParams.get('tag');

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3cZQotIF9E8GIug0GzH75RM5WGeS1Ah3l-d56FaDpq1ZV4To3SxDRwOaBQZTRSDLK6WAgjRdrueh4/pub?gid=0&single=true&output=csv";

fetch(sheetURL)
.then(response => response.text())
.then(data => {

    const linhas = data.split("\n").map(l => l.split(","));
    const registros = linhas.slice(1);

    const equipamento = registros.find(r => r[0] === tag);
    if (!equipamento) return;

    document.getElementById("equipamento").innerText = "Equipamento: " + equipamento[0];
    document.getElementById("categoria").innerText = equipamento[1];
    document.getElementById("pmta").innerText = equipamento[2] + " bar";
    document.getElementById("fluido").innerText = equipamento[3];
    document.getElementById("proxima").innerText = equipamento[8];

    const status = document.getElementById("status");
    status.innerText = equipamento[9];
    status.classList.add(equipamento[9] === "DENTRO DO PRAZO" ? "ok" : "vencido");

    const relatoriosTipos = [
        {nome:"Inspeção Visual Externa", index:10, dataIndex:14},
        {nome:"Inspeção Visual Interna", index:11, dataIndex:15},
        {nome:"Medição de Espessura", index:12, dataIndex:16},
        {nome:"Teste Hidrostático", index:13, dataIndex:17}
    ];

    const tabela = document.getElementById("relatorios");

    relatoriosTipos.forEach(tipo => {
        if (equipamento[tipo.index]) {
            tabela.innerHTML += `
                <tr>
                    <td>${tipo.nome}</td>
                    <td>${equipamento[tipo.dataIndex] || "-"}</td>
                    <td><a class="button" href="${equipamento[tipo.index]}" target="_blank">Visualizar</a></td>
                </tr>
            `;
        }
    });

    document.getElementById("art").innerHTML =
        equipamento[18]
        ? `<a class="button" href="${equipamento[18]}" target="_blank">Visualizar ART</a>`
        : "Não disponível";

    document.getElementById("prontuario").innerHTML =
        equipamento[19]
        ? `<a class="button" href="${equipamento[19]}" target="_blank">Visualizar Prontuário</a>`
        : "Não disponível";

});

document.getElementById("dataGeracao").innerText =
    new Date().toLocaleString("pt-BR");
</script>

</body>
</html>
