<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGX | Gestão NR-13</title>

<style>

body {
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background-color:#f4f6f9;
}

/* HEADER */
header{
    background-color:#ffffff;
    padding:15px 40px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.header-left{
    display:flex;
    align-items:center;
}

header img{
    height:60px;
    margin-right:20px;
}

header h2{
    margin:0;
    color:#1f3c88;
    font-weight:600;
}

.logout-btn{
    display:flex;
    align-items:center;
    gap:8px;
    background:#dc3545;
    color:white;
    border:none;
    padding:8px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    font-size:14px;
}

.logout-btn:hover{
    background:#b02a37;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:40px auto;
    padding:0 20px;
}

/* CARD */
.card{
    background:#ffffff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
    margin-bottom:30px;
}

/* EQUIPAMENTO GRID */
.equipamento{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}

.equip-left h1{
    margin-top:0;
}

.equip-left p{
    margin:6px 0;
}

.equip-right{
    text-align:right;
}

.status{
    display:inline-block;
    padding:10px 18px;
    border-radius:8px;
    font-weight:bold;
    margin-bottom:10px;
}

.status.ok{
    background:#d4edda;
    color:#155724;
}

.status.vencida{
    background:#f8d7da;
    color:#721c24;
}

.proxima{
    font-size:14px;
    color:#666;
}

.data-proxima{
    font-size:22px;
    font-weight:bold;
    color:#333;
}

/* TABELA */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th{
    background:#e9ecef;
    text-align:left;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #eee;
}

/* BOTÃO */
.button{
    background:#1f3c88;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    text-decoration:none;
    font-size:14px;
}

.button:hover{
    background:#162d66;
}

</style>
</head>
<body>

<header>

    <div class="header-left">
        <img src="DGX - ENGENHARIA.png" alt="DGX Engenharia Industrial">
        <h2>DGX | Engenharia Industrial</h2>
    </div>

    <button class="logout-btn" onclick="window.location.href=window.location.pathname">
        <!-- ÍCONE SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" viewBox="0 0 16 16">
            <path d="M6 2a2 2 0 0 0-2 2v2h1V4a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-2H4v2a2 2 0 0 0 2 2h5a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H6z"/>
            <path d="M.146 8.354a.5.5 0 0 1 0-.708L3.793 4H9.5a.5.5 0 0 1 0 1H3.793l-3.647 3.646a.5.5 0 0 1-.708 0z"/>
        </svg>
        Sair
    </button>

</header>

<div class="container">

    <!-- EQUIPAMENTO -->
    <div class="card equipamento">
        
        <div class="equip-left">
            <h1>Equipamento: MA01-513M0053</h1>
            <p><strong>Categoria NR-13:</strong> III</p>
            <p><strong>PMTA:</strong> 6,0 bar</p>
            <p><strong>Fluido:</strong> Metanol / Água</p>
        </div>

        <div class="equip-right">
            <div class="status ok">DENTRO DO PRAZO</div>
            <div class="proxima">Próxima inspeção</div>
            <div class="data-proxima">28/01/2032</div>
        </div>

    </div>

    <!-- RELATÓRIOS -->
    <div class="card">
        <h3>RELATÓRIOS</h3>

        <table>
            <tr>
                <th>Tipo</th>
                <th>Data</th>
                <th>Download</th>
            </tr>
            <tr>
                <td>Inspeção Visual Externa</td>
                <td>28/01/2026</td>
                <td><a href="#" class="button">Baixar PDF</a></td>
            </tr>
        </table>
    </div>

    <!-- ART -->
    <div class="card">
        <h3>ART</h3>
        <p>Não disponível</p>
    </div>

    <!-- PRONTUÁRIO -->
    <div class="card">
        <h3>PRONTUÁRIO NR-13</h3>
        <p>Não disponível</p>
    </div>

</div>

</body>
</html>
