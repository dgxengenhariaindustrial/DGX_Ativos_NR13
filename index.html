<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGX | Gestão NR-13</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
}

/* HEADER */
header{
    background:#ffffff;
    padding:15px 40px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.header-left{
    display:flex;
    align-items:center;
}

header img{
    height:60px;
    margin-right:20px;
}

header h2{
    margin:0;
    color:#1f3c88;
    font-weight:600;
}

.header-buttons{
    display:flex;
    gap:10px;
}

.btn{
    border:none;
    padding:8px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    font-size:14px;
}

.btn-print{
    background:#1f3c88;
    color:white;
}

.btn-print:hover{
    background:#162d66;
}

.btn-exit{
    background:#dc3545;
    color:white;
}

.btn-exit:hover{
    background:#b02a37;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:40px auto;
    padding:0 20px;
}

/* CARD */
.card{
    background:#ffffff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
    margin-bottom:30px;
}

/* EQUIPAMENTO GRID */
.equipamento{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}

.equip-left h1{
    margin-top:0;
}

.equip-left p{
    margin:6px 0;
}

.equip-right{
    text-align:right;
}

.status{
    display:inline-block;
    padding:10px 18px;
    border-radius:8px;
    font-weight:bold;
    margin-bottom:10px;
}

.status.ok{
    background:#d4edda;
    color:#155724;
}

.status.vencida{
    background:#f8d7da;
    color:#721c24;
}

.proxima{
    font-size:14px;
    color:#666;
}

.data-proxima{
    font-size:22px;
    font-weight:bold;
    color:#333;
}

.data-geracao{
    margin-top:20px;
    font-size:12px;
    color:#666;
}

/* TABELA */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th{
    background:#e9ecef;
    text-align:left;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #eee;
}

.button{
    background:#1f3c88;
    color:white;
    padding:6px 12px;
    border-radius:6px;
    text-decoration:none;
    font-size:13px;
}

.button:hover{
    background:#162d66;
}

/* OCULTAR BOTÕES NA IMPRESSÃO */
@media print{
    header{
        display:none;
    }
}
</style>
</head>

<body>

<header>
    <div class="header-left">
        <img src="DGX - ENGENHARIA.png" alt="DGX Engenharia Industrial">
        <h2>DGX | Engenharia Industrial</h2>
    </div>

    <div class="header-buttons">
        <button class="btn btn-print" onclick="window.print()">📄 Gerar PDF</button>
        <button class="btn btn-exit" onclick="history.back()">🚪 Sair</button>
    </div>
</header>

<div class="container">
<div id="conteudo"></div>
</div>

<script>

/* ====== DATA DE GERAÇÃO ====== */
const agora = new Date();
const dataGeracao = agora.toLocaleDateString('pt-BR') + 
                    " - " + 
                    agora.toLocaleTimeString('pt-BR');

/* ====== DADOS FIXOS (PODEM VOLTAR A SER DINÂMICOS) ====== */
const equipamento = {
    tag: "MA01-513M0053",
    categoria: "III",
    pmta: "6,0",
    fluido: "Metanol / Água",
    status: "DENTRO DO PRAZO",
    proxima: "28/01/2032",
    dataInspecao: "28/01/2026"
};

const statusClass = equipamento.status === "DENTRO DO PRAZO" ? "ok" : "vencida";

/* ====== RENDERIZAÇÃO ====== */

document.getElementById("conteudo").innerHTML = `
    <div class="card equipamento">
        <div class="equip-left">
            <h1>Equipamento: ${equipamento.tag}</h1>
            <p><strong>Categoria NR-13:</strong> ${equipamento.categoria}</p>
            <p><strong>PMTA:</strong> ${equipamento.pmta} bar</p>
            <p><strong>Fluido:</strong> ${equipamento.fluido}</p>
        </div>

        <div class="equip-right">
            <div class="status ${statusClass}">
                ${equipamento.status}
            </div>
            <div class="proxima">Próxima inspeção</div>
            <div class="data-proxima">${equipamento.proxima}</div>
        </div>

        <div class="data-geracao">
            Data de geração: ${dataGeracao}
        </div>
    </div>

    <div class="card">
        <h3>RELATÓRIOS</h3>
        <table>
            <tr>
                <th>Tipo</th>
                <th>Data</th>
                <th>Download</th>
            </tr>
            <tr>
                <td>Inspeção Visual Externa</td>
                <td>${equipamento.dataInspecao}</td>
                <td><a href="#" class="button">Baixar PDF</a></td>
            </tr>
        </table>
    </div>

    <div class="card">
        <h3>ART</h3>
        <p>Não disponível</p>
    </div>

    <div class="card">
        <h3>PRONTUÁRIO NR-13</h3>
        <p>Não disponível</p>
    </div>
`;

</script>

</body>
</html>
